      operationId: listDrugs
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: search
          in: query
          description: Search by drug name or generic name
          schema:
            type: string
        - name: category
          in: query
          schema:
            $ref: '#/components/schemas/DrugCategory'
        - name: active
          in: query
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Paginated drug list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrugListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Drugs]
      summary: Add drug to catalog
      description: Creates a new drug. Pharmacist and Admin only.
      operationId: createDrug
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDrugRequest'
      responses:
        '201':
          description: Drug created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Drug'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: A drug with the same name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /drugs/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/UUID'

    patch:
      tags: [Drugs]
      summary: Update drug
      description: Updates drug catalog fields. Pharmacist and Admin only.
      operationId: updateDrug
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDrugRequest'
      responses:
        '200':
          description: Updated drug
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Drug'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /drugs/{id}/stock:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/UUID'

    get:
      tags: [Drugs]
      summary: Get stock batches for a drug
      description: Returns all stock batches ordered by expiry date ascending (FEFO order). Pharmacist and Admin only.
      operationId: getDrugStock
      responses:
        '200':
          description: Stock batches
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StockListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Drugs]
      summary: Add stock batch
      description: Records a new stock batch received from a supplier. Pharmacist and Admin only.
      operationId: addStockBatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddStockBatchRequest'
      responses:
        '201':
          description: Stock batch created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrugStockBatch'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /drugs/{id}/stock/{batchId}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/UUID'
      - name: batchId
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/UUID'

    patch:
      tags: [Drugs]
      summary: Adjust stock batch quantity
      description: Manual stock adjustment (e.g. stock count correction, damage). Pharmacist and Admin only.
      operationId: adjustStock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdjustStockRequest'
      responses:
        '200':
          description: Updated batch
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrugStockBatch'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Adjustment would result in negative stock
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

