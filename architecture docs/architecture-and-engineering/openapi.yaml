        - name: dateFrom
          in: query
          schema:
            $ref: '#/components/schemas/ISODate'
        - name: dateTo
          in: query
          schema:
            $ref: '#/components/schemas/ISODate'
      responses:
        '200':
          description: Paginated invoice list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /invoices/my:
    get:
      tags: [Billing]
      summary: List own invoices
      description: Returns the authenticated patient's own billing history. Patient only.
      operationId: listMyInvoices
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/InvoiceStatus'
      responses:
        '200':
          description: Paginated invoice list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /invoices/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/UUID'

    get:
      tags: [Billing]
      summary: Get invoice detail
      description: All authenticated roles. Patients may only access their own invoices.
      operationId: getInvoice
      responses:
        '200':
          description: Full invoice with payment history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /invoices/{id}/payments:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/UUID'

    post:
      tags: [Billing]
      summary: Record payment against invoice
      description: |
        Records a payment. Supports partial payments — multiple calls are valid
        until the invoice is fully paid. Pharmacist and Admin only.

        Business rules:
        - Payment amount must be ≤ outstanding amount
        - Invoice status is automatically updated to `PARTIAL` or `PAID`
      operationId: recordPayment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordPaymentRequest'
      responses:
        '201':
          description: Payment recorded; returns updated invoice
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Payment exceeds outstanding amount or invoice already fully paid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /invoices/{id}/pdf:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/UUID'

    get:
      tags: [Billing]
      summary: Download invoice PDF
      description: Generates and streams a PDF of the invoice. All authenticated roles; patients limited to own invoices.
      operationId: downloadInvoicePdf
      responses:
        '200':
          description: PDF binary stream
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

