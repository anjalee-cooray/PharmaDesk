        '401':
          $ref: '#/components/responses/Unauthorized'

  # ---------------------------------------------------------------------------
  # Analytics
  # ---------------------------------------------------------------------------

  /analytics/top-drugs:
    get:
      tags: [Analytics]
      summary: Most dispensed drugs
      description: Returns the top dispensed drugs ranked by dispense count for the given period. Pharmacist and Admin only.
      operationId: getTopDrugs
      parameters:
        - name: period
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/TimePeriod'
        - name: limit
          in: query
          description: Number of top drugs to return (default 10, max 50)
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        '200':
          description: Top dispensed drugs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopDrugsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /analytics/revenue:
    get:
      tags: [Analytics]
      summary: Monthly revenue summary
      description: Returns month-by-month revenue breakdown (invoiced, collected, outstanding). Pharmacist and Admin only.
      operationId: getRevenueSummary
      parameters:
        - name: from
          in: query
          description: Start month inclusive (YYYY-MM)
          required: true
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
            example: "2026-01"
        - name: to
          in: query
          description: End month inclusive (YYYY-MM)
          required: true
          schema:
            type: string
            pattern: '^\d{4}-\d{2}$'
            example: "2026-06"
      responses:
        '200':
          description: Monthly revenue summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevenueSummaryResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /analytics/low-stock:
    get:
      tags: [Analytics]
      summary: Drugs below stock threshold
      description: Returns all drugs where current stock ≤ configured low-stock threshold. Pharmacist and Admin only.
      operationId: getLowStockDrugs
      responses:
        '200':
          description: Low stock drugs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LowStockResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /analytics/prescription-volume:
    get:
      tags: [Analytics]
      summary: Prescription volume trends
      description: Returns prescription counts bucketed by the requested period. Pharmacist and Admin only.
      operationId: getPrescriptionVolume
      parameters:
        - name: period
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/TimePeriod'
        - name: dateFrom
          in: query
          schema:
            $ref: '#/components/schemas/ISODate'
        - name: dateTo
          in: query
          schema:
            $ref: '#/components/schemas/ISODate'
      responses:
        '200':
          description: Prescription volume trend data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrescriptionVolumeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /analytics/export:
    get:
      tags: [Analytics]
      summary: Export analytics report
      description: |
        Exports a full analytics report as CSV or PDF for the specified period.
        Admin only. Report generation may take up to 30 seconds for 12 months of data.
      operationId: exportAnalyticsReport
      parameters:
        - name: format
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/ReportFormat'
        - name: dateFrom
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/ISODate'
        - name: dateTo
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/ISODate'
      responses:
        '200':
          description: Report file stream
          content:
            application/pdf:
              schema:
                type: string
                format: binary
            text/csv:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          description: Date range exceeds maximum allowed (12 months)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
