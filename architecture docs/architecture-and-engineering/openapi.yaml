  # ---------------------------------------------------------------------------
  # Prescriptions
  # ---------------------------------------------------------------------------

  /prescriptions:
    get:
      tags: [Prescriptions]
      summary: List all prescriptions
      description: Paginated, filterable list of prescriptions. Pharmacist and Admin only.
      operationId: listPrescriptions
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/SortParam'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/PrescriptionStatus'
        - name: patientId
          in: query
          schema:
            $ref: '#/components/schemas/UUID'
        - name: drugId
          in: query
          schema:
            $ref: '#/components/schemas/UUID'
        - name: dateFrom
          in: query
          schema:
            $ref: '#/components/schemas/ISODate'
        - name: dateTo
          in: query
          schema:
            $ref: '#/components/schemas/ISODate'
      responses:
        '200':
          description: Paginated prescription list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrescriptionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Prescriptions]
      summary: Create prescription
      description: |
        Creates a new prescription in `PENDING` status. Pharmacist only.

        Business rules enforced:
        - Drug must be active and have sufficient stock
        - Patient must not have an active prescription for the same drug (duplicate check)
        - Conflict check flags concurrent prescriptions for drugs with known interactions
      operationId: createPrescription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePrescriptionRequest'
      responses:
        '201':
          description: Prescription created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prescription'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /prescriptions/my:
    get:
      tags: [Prescriptions]
      summary: List own prescriptions
      description: Returns the authenticated patient's own prescriptions. Patient only.
      operationId: listMyPrescriptions
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/PrescriptionStatus'
        - name: dateFrom
          in: query
          schema:
            $ref: '#/components/schemas/ISODate'
        - name: dateTo
          in: query
          schema:
            $ref: '#/components/schemas/ISODate'
      responses:
        '200':
          description: Paginated list of own prescriptions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrescriptionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /prescriptions/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/UUID'

    get:
      tags: [Prescriptions]
      summary: Get prescription detail
      description: All authenticated roles. Patients may only access their own prescriptions (enforced server-side).
      operationId: getPrescription
      responses:
        '200':
          description: Prescription detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prescription'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Prescriptions]
      summary: Update prescription
      description: |
        Updates status or content of a prescription. Pharmacist and Admin only.

        Valid status transitions:
        - `PENDING` → `VERIFIED`
        - `PENDING` → `REJECTED` (requires `rejectionReason`)
        - `VERIFIED` → `DISPENSED` (decrements stock, generates invoice)
        - `PENDING` | `VERIFIED` → `CANCELLED`
        - Content fields (`dosage`, `quantity`, `instructions`) are only modifiable in `PENDING` status
      operationId: updatePrescription
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePrescriptionRequest'
      responses:
        '200':
          description: Updated prescription
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prescription'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    delete:
      tags: [Prescriptions]
      summary: Cancel prescription
      description: |
        Cancels the prescription (sets status to `CANCELLED`). Pharmacist and Admin only.
        Only valid for prescriptions in `PENDING` or `VERIFIED` status.
      operationId: cancelPrescription
      responses:
        '204':
          description: Prescription cancelled
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /prescriptions/{id}/audit:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/UUID'

    get:
      tags: [Prescriptions]
      summary: Get prescription audit trail
      description: Returns the full immutable audit log for a prescription. Pharmacist and Admin only.
      operationId: getPrescriptionAuditTrail
      responses:
        '200':
          description: Audit log entries ordered by time ascending
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /prescriptions/{id}/refill:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/UUID'

    post:
      tags: [Prescriptions]
      summary: Request prescription refill
      description: |
        Submits a refill request for a dispensed prescription. Patient only.
        Creates a new prescription in `PENDING` status linked to the original.
        Only valid when the original prescription is in `DISPENSED` status.
      operationId: requestRefill
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefillRequest'
      responses:
        '201':
          description: New prescription created for the refill
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Prescription'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ---------------------------------------------------------------------------
  # Drugs & Inventory
  # ---------------------------------------------------------------------------

  /drugs:
    get:
      tags: [Drugs]
      summary: List drugs
